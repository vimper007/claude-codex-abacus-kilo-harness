name: Mirror to GitLab

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Clone GitHub repo as mirror
        run: |
          git clone --mirror https://github.com/vimper007/claude-codex-abacus-kilo-harness.git repo.git

      - name: Push mirror to GitLab
        run: |
          cd repo.git
          git push --mirror https://oauth2:${GITLAB_TOKEN}@gitlab.com/vimper007/claude-codex-abacus-harness.git
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
